name: Release Workflow

on:
  push:
    tags:
      - 'v*'  # 当推送以 v 开头的 tag 时触发，例如 v1.0.0

jobs:
  test-and-build:
    name: Run Tests and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'  # 根据项目的 Go 版本调整
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v -count=1

      - name: Build for Linux
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o gateway-linux-amd64 ./cmd/main.go

      - name: Build for Windows
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o gateway-windows-amd64.exe ./cmd/main.go

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-linux-amd64
          path: gateway-linux-amd64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-windows-amd64
          path: gateway-windows-amd64.exe

  release:
    name: Create Release
    needs: test-and-build  # 依赖 test-and-build 作业成功完成
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-linux-amd64
          path: .

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-windows-amd64
          path: .

      - name: Make binaries executable
        run: chmod +x gateway-linux-amd64 gateway-windows-amd64.exe

      - name: Get tag name
        id: get_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag（如果存在）
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "CHANGELOG=$(git log --oneline $PREV_TAG..$TAG_NAME)" >> $GITHUB_ENV
          else
            echo "CHANGELOG=$(git log --oneline)" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            ## Changes
            
            ${{ env.CHANGELOG }}
          files: |
            gateway-linux-amd64
            gateway-windows-amd64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}