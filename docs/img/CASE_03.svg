<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="40" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#1e293b">CASE_03: CITY_ENVIRONMENT_MONITORING</text>

  <g transform="translate(50, 150)">
    <rect width="160" height="100" rx="2" fill="#fff" stroke="#0ea5e9" stroke-width="1"/>
    <rect width="160" height="24" fill="#e0f2fe"/>
    <text x="80" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#0369a1">采集规则 [Input]</text>
    <text x="15" y="50" font-family="monospace" font-size="10" fill="#64748b">AQI / NOISE / FLOW</text>
    <text x="15" y="75" font-family="monospace" font-size="10" fill="#22c55e">Precision: +30%</text>
  </g>

  <g transform="translate(320, 120)">
    <rect width="200" height="160" rx="4" fill="#fff" stroke="#6c5ce7" stroke-width="1.5"/>
    <rect width="200" height="28" fill="#f3f0ff"/>
    <text x="100" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#6c5ce7">EDGE_PROXY_NODE</text>
    <text x="20" y="60" font-family="monospace" font-size="10" fill="#1e293b">Rule: Threshold_Alarm</text>
    <text x="20" y="90" font-family="monospace" font-size="10" fill="#1e293b">Window: Traffic_Stats</text>
    <text x="20" y="140" font-family="monospace" font-size="10" fill="#6c5ce7">Status: Minute-level Sync</text>
  </g>

  <g transform="translate(620, 150)">
    <rect width="140" height="100" rx="2" fill="#fff" stroke="#334155" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">管理平台 [Output]</text>
    <text x="15" y="50" font-family="monospace" font-size="10" fill="#64748b">LOCAL_ALARM</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#64748b">REMOTE_NOTIFY</text>
    <text x="15" y="90" font-family="monospace" font-size="10" fill="#64748b">DATA_FORWARD</text>
  </g>

  <path id="path_c1" d="M210 200 L 320 200" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,2" fill="none"/>
  <path id="path_c2" d="M520 200 L 620 200" stroke="#6c5ce7" stroke-width="1" fill="none"/>

  <circle r="3" fill="#0ea5e9">
    <animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#path_c1"/></animateMotion>
  </circle>
  <circle r="3" fill="#6c5ce7">
    <animateMotion dur="2s" repeatCount="indefinite"><mpath href="#path_c2"/></animateMotion>
  </circle>
</svg>
