<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </radialGradient>

    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#0f172a" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#smallGrid)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0f172a" stroke-width="1" opacity="0.1"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      /* 面板改为白色半透明 */
      .panel-bg { fill: #ffffff; stroke-width: 1.5; fill-opacity: 0.9; }
      /* 文本改为深色 */
      .text-label { fill: #1e293b; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.5px; }
      .text-sub { fill: #64748b; font-family: 'Courier New', monospace; font-size: 11px; }
      .text-digital { fill: #16a34a; font-family: monospace; font-size: 11px; font-weight: bold; }
      /* 线条调为中灰色 */
      .line-main { fill: none; stroke: #cbd5e1; stroke-width: 2; }
      .wave-path { fill: none; stroke: #8b5cf6; stroke-width: 2; filter: url(#glow); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg_grad)"/>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <path d="M450 120 H950" class="line-main" />
  
  <g transform="translate(0, 40)">
    <g transform="translate(360, 0)">
      <rect width="180" height="50" rx="25" class="panel-bg" stroke="#f59e0b" filter="url(#glow)"/>
      <text x="90" y="32" text-anchor="middle" class="text-label">CLOUD (MQTT)</text>
      <path id="up_l1" d="M90 80 V50" class="line-main"/>
      <circle r="3" fill="#f59e0b" filter="url(#glow)"><animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#up_l1"/></animateMotion></circle>
    </g>
    <g transform="translate(610, 0)">
      <rect width="180" height="50" rx="25" class="panel-bg" stroke="#0ea5e9" filter="url(#glow)"/>
      <text x="90" y="32" text-anchor="middle" class="text-label">CLOUD (OPC-UA)</text>
      <path id="up_l2" d="M90 80 V50" class="line-main"/>
      <circle r="3" fill="#0ea5e9" filter="url(#glow)"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#up_l2"/></animateMotion></circle>
    </g>
    <g transform="translate(860, 0)">
      <rect width="180" height="50" rx="25" class="panel-bg" stroke="#8b5cf6" filter="url(#glow)"/>
      <text x="90" y="32" text-anchor="middle" class="text-label">CLOUD (HTTP)</text>
      <path id="up_l3" d="M90 80 V50" class="line-main"/>
      <circle r="3" fill="#8b5cf6" filter="url(#glow)"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#up_l3"/></animateMotion></circle>
    </g>
  </g>

  <g transform="translate(550, 160)">
    <rect width="300" height="70" rx="8" class="panel-bg" stroke="#16a34a" />
    <text x="150" y="42" text-anchor="middle" class="text-label">Industrial EdgeX Gateway</text>
    <path d="M150 0 V-40" class="line-main" />
  </g>

  <path id="path_main_bus" d="M700 230 L700 560" class="line-main" />
  <circle r="3" fill="#64748b" filter="url(#glow)"><animateMotion dur="4s" repeatCount="indefinite"><mpath href="#path_main_bus"/></animateMotion></circle>

  <g transform="translate(550, 275)">
    <rect width="300" height="95" rx="8" class="panel-bg" stroke="#64748b" />
    <text x="150" y="30" text-anchor="middle" class="text-label">SHADOW CORE</text>
    <g transform="translate(30, 45)">
      <rect width="40" height="6" rx="2" fill="#e2e8f0" /><rect width="40" height="6" rx="2" y="12" fill="#e2e8f0" />
      <rect width="20" height="6" rx="2" y="24" fill="#0ea5e9"><animate attributeName="width" values="10;40;20" dur="2s" repeatCount="indefinite" /></rect>
    </g>
    <rect x="90" y="55" width="4" height="2" fill="#0ea5e9"><animate attributeName="x" from="90" to="210" dur="0.8s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" /></rect>
    <rect x="90" y="65" width="4" height="2" fill="#f59e0b"><animate attributeName="x" from="210" to="90" dur="1.2s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite" /></rect>
    <g transform="translate(230, 45)">
      <circle r="4" cx="5" cy="5" fill="#16a34a"><animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite" /></circle>
      <text x="15" y="10" class="text-sub" style="font-size:9px">V-SYNC</text>
      <text x="15" y="22" class="text-digital"><animate attributeName="textContent" values="24ms;42ms;31ms" dur="2s" calcMode="discrete" repeatCount="indefinite" />24ms</text>
    </g>
    <text x="150" y="85" text-anchor="middle" class="text-sub">IOPS: 12.4k / LATENCY: 0.2ms</text>
  </g>

  <g transform="translate(550, 410)">
    <rect width="300" height="115" rx="8" class="panel-bg" stroke="#8b5cf6" />
    <text x="150" y="30" text-anchor="middle" class="text-label">RTT MTU GAP</text>
    <mask id="wave_mask"><rect x="40" y="45" width="220" height="40" fill="white" /></mask>
    <g mask="url(#wave_mask)">
      <path class="wave-path" d="M40 75 L60 65 L80 85 L100 55 L120 75 L140 65 L160 85 L180 55 L200 75 L220 65 L240 85 L260 55">
        <animateTransform attributeName="transform" type="translate" from="0" to="-40" dur="1s" repeatCount="indefinite" />
      </path>
    </g>
    <line x1="40" y1="45" x2="40" y2="85" stroke="#a78bfa" stroke-width="1" opacity="0.8"><animate attributeName="x1" from="40" to="260" dur="3s" repeatCount="indefinite" /><animate attributeName="x2" from="40" to="260" dur="3s" repeatCount="indefinite" /></line>
    <text x="50" y="100" class="text-sub">MTU: 1500</text><text x="250" y="100" text-anchor="end" class="text-sub">RTT: 42ms</text>
  </g>

  <path id="bus_horizontal" d="M150 560 L1250 560" class="line-main" />

  <g transform="translate(150, 620)">
    <g transform="translate(0,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#f59e0b" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">MQTT</text>
      <path id="l1" d="M65 0 V-60" class="line-main"/><circle r="2.5" fill="#f59e0b" filter="url(#glow)"><animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#l1"/></animateMotion></circle>
      <circle r="2" fill="#f59e0b" opacity="0.6"><animateMotion dur="1.2s" begin="0.6s" repeatCount="indefinite"><mpath href="#l1"/></animateMotion></circle>
    </g>
    <g transform="translate(200,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#0ea5e9" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">OPC-UA</text>
      <path id="l2" d="M65 0 V-60" class="line-main"/><circle r="2.5" fill="#0ea5e9" filter="url(#glow)"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#l2"/></animateMotion></circle>
    </g>
    <g transform="translate(400,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#ec4899" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">MODBUS</text>
      <path id="l3" d="M65 0 V-60" class="line-main"/><circle r="2.5" fill="#ec4899" filter="url(#glow)"><animateMotion dur="1.3s" repeatCount="indefinite"><mpath href="#l3"/></animateMotion></circle>
    </g>
    <g transform="translate(600,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#16a34a" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">BACNET</text>
      <path id="l4" d="M65 0 V-60" class="line-main"/><circle r="2.5" fill="#16a34a" filter="url(#glow)"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#l4"/></animateMotion></circle>
    </g>
    <g transform="translate(800,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#eab308" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">SNMP</text>
      <path id="l5" d="M65 0 V-60" class="line-main"/><circle r="2.5" fill="#eab308" filter="url(#glow)"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#l5"/></animateMotion></circle>
    </g>
    <g transform="translate(1000,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#8b5cf6" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">HTTP API</text>
      <path id="l6" d="M65 0 V-60" class="line-main"/><circle r="2.5" fill="#8b5cf6" filter="url(#glow)"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#l6"/></animateMotion></circle>
    </g>
  </g>

  <path id="ctrl_flow" d="M850 195 H1320 V880 H80 V195 H550" fill="none" stroke="#16a34a" stroke-width="1" stroke-dasharray="10,5" opacity="0.2"/>
  <circle r="2" fill="#16a34a"><animateMotion dur="12s" repeatCount="indefinite"><mpath href="#ctrl_flow"/></animateMotion></circle>

</svg>
