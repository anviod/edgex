<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
    
    <linearGradient id="grad-slate" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#cbd5e1"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#bfdbfe"/><stop offset="100%" stop-color="#eff6ff"/></linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#fef3c7"/></linearGradient>
    <linearGradient id="grad-emerald" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a7f3d0"/><stop offset="100%" stop-color="#ecfdf5"/></linearGradient>

    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#10b981"/>
    </marker>

    <style>
      .title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .group-title { font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val { fill:#0f172a; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:22px; }
      .chart-lbl { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:11px; font-weight:600; }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#64748b" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="title">时序数据本地存储：边缘历史查询与断网可用系统</text>
    <text y="24" class="subtitle">极致工整纵向四级等距栅格化对齐 · 数据管道横向绝对单条直线无穿模设计</text>
  </g>

  <g transform="translate(70, 0)">
    <rect x="0" y="130" width="260" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="260" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="260" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#475569">■ 边缘现场采集层</text>

    <g transform="translate(15, 175)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#64748b"/>
      <text x="20" y="28" class="lbl">ScanEngine 高频采集</text>
      <text x="20" y="48" class="code">Rate: 500 points / 1s cycle</text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#64748b"/>
      <text x="20" y="28" class="lbl">Virtual Shadow 虚像模型</text>
      <text x="20" y="48" class="code">Task: 计算关键指标存档</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#64748b"/>
      <text x="20" y="28" class="lbl">告警事件边缘触发器</text>
      <text x="20" y="48" class="code">Event: 突发变动捕获存档</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#64748b"/>
      <text x="20" y="28" class="lbl">采集内存高速环形队列</text>
      <text x="20" y="48" class="code">Memory Buffer: Pre-write</text>
    </g>
  </g>


  <path d="M 330 210 H 490" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)" class="dash-line"/>
  <path d="M 330 320 H 490" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)" class="dash-line"/>
  <path d="M 330 430 H 490" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)" class="dash-line"/>
  <path d="M 330 540 H 490" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)" class="dash-line"/>

  <circle r="4" fill="#64748b"><animateMotion dur="1.7s" repeatCount="indefinite" path="M 330 210 H 490"/></circle>
  <circle r="4" fill="#64748b"><animateMotion dur="2.2s" repeatCount="indefinite" path="M 330 320 H 490"/></circle>
  <circle r="4" fill="#64748b"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 330 430 H 490"/></circle>
  <circle r="4" fill="#64748b"><animateMotion dur="1.9s" repeatCount="indefinite" path="M 330 540 H 490"/></circle>


  <g transform="translate(490, 0)">
    <rect x="0" y="130" width="420" height="510" rx="14" fill="#ffffff" stroke="#475569" stroke-width="2" stroke-dasharray="8 5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="420" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="420" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#1e293b">■ 本地时序数据库引擎 (TSDB Edge)</text>

    <g transform="translate(25, 175)">
      <rect width="370" height="70" rx="10" fill="url(#grad-slate)" stroke="#475569" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">SQLite / 嵌入式 TSDB 内核</text>
      <text x="25" y="50" class="code">Engine: 高内聚磁盘空间物理持久化</text>
    </g>

    <g transform="translate(25, 285)">
      <rect width="370" height="70" rx="10" fill="url(#grad-blue)" stroke="#2563eb" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">边缘自适应滚动压缩策略</text>
      <text x="25" y="50" class="code">Algorithm: 1min 平均值降采样 + 原始极值点</text>
    </g>

    <g transform="translate(25, 395)">
      <rect width="370" height="70" rx="10" fill="url(#grad-amber)" stroke="#d97706" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">分级 TTL 数据保留期限机制</text>
      <text x="25" y="50" class="code">Retention: Raw data 7 Days / Aggregated 365 Days</text>
    </g>

    <g transform="translate(25, 505)">
      <rect width="370" height="70" rx="10" fill="url(#grad-emerald)" stroke="#10b981" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">动态磁盘阈值与健康监控</text>
      <text x="25" y="50" class="code">Auto-Purge: usage &gt; 68% → 触发自动先进先出清理</text>
    </g>
  </g>


  <path d="M 910 210 H 1050" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <path d="M 910 320 H 1050" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <path d="M 910 430 H 1050" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <path d="M 910 540 H 1050" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-emerald)"/>

  <circle r="3.5" fill="#475569"><animateMotion dur="1.2s" repeatCount="indefinite" path="M 910 210 H 1050"/></circle>
  <circle r="3.5" fill="#475569"><animateMotion dur="1.8s" repeatCount="indefinite" path="M 910 320 H 1050"/></circle>
  <circle r="3.5" fill="#475569"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 910 430 H 1050"/></circle>
  <circle r="3.5" fill="#10b981"><animateMotion dur="1.1s" repeatCount="indefinite" path="M 910 540 H 1050"/></circle>


  <g transform="translate(1050, 0)">
    <rect x="0" y="130" width="280" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="280" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="280" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#0f172a">■ 边缘开放数据服务</text>

    <g transform="translate(15, 175)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="18" y="24" class="chart-lbl">本地历史高并发查询服务</text>
      <text x="18" y="48" class="code" fill="#2563eb">REST API: Time-Range Query</text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="16" y="22" class="chart-lbl">边缘 HMI 历史趋势曲线组件</text>
      <polyline points="25,50 55,38 85,42 115,26 145,34 175,20 205,24 235,16" fill="none" stroke="#475569" stroke-width="2"/>
      <circle cx="235" cy="16" r="3" fill="#475569"/>
    </g>

    <g transform="translate(15, 395)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="18" y="24" class="chart-lbl">网绝缘环境可用性认证</text>
      <text x="18" y="48" class="code" fill="#d97706">✓ Local Autonomy Available</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="250" height="70" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
      <text x="18" y="24" class="chart-lbl" fill="#166534">选择性动态上报同步</text>
      <text x="18" y="48" class="code" fill="#15803d">MQTT: Upload Digest Schema</text>
    </g>
  </g>
</svg>
