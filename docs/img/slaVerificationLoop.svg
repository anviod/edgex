<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="460" viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EdgeX SLA 验证闭环架构图</title>
  <desc id="desc">运行时监测、可观测 API 与 CI/Soak 验证形成的严格正交无穿模 SLA 回归闭环（底部对齐版）</desc>
  <defs>
    <!-- 全局微渐变科技感底色 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    
    <!-- 现代科技立体柔和阴影 - 严格控制扩散防穿模视觉污染 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>

    <!-- 统一标准剪裁防圆角溢出 -->
    <clipPath id="rect-clip"><rect width="260" height="300" rx="12"/></clipPath>
    <clipPath id="header-clip"><rect width="260" height="38" rx="12"/></clipPath>

    <!-- 精准单向正交导向标记 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#ea580c"/>
    </marker>

    <!-- 全局统一排版样式表 -->
    <style>
      .text-title { font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; }
      .text-lbl { font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-size: 12px; font-weight: 700; }
      .text-sub { font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-size: 11px; font-weight: 500; }
      .text-code { font-family: 'Consolas','Courier New',monospace; font-size: 10.5px; font-weight: 600; }
      .pulse-light { animation: blink 2s ease-in-out infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; filter: drop-shadow(0 0 2px #ef4444); } 50% { opacity: 0.4; } }
    </style>
  </defs>

  <!-- 画布物理底板 -->
  <rect width="960" height="460" fill="url(#bg)"/>
  <rect x="20" y="20" width="920" height="420" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="20" width="920" height="6" rx="3" fill="#d97706" opacity="0.9"/>
  
  <!-- 顶层全局引导说明语 -->
  <text x="480" y="46" text-anchor="middle" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="12" font-weight="500" fill="#64748b" letter-spacing="0.5px">运行时指标经 diagnostics 门控 ➔ 压测与 Soak 在 CI 中形成回归闭环</text>

  <!-- ==================== CONTAINER 1: 运行时监测 (X=40, Y=50) ==================== -->
  <g transform="translate(40, 50)" filter="url(#shadow)">
    <rect width="260" height="300" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect width="260" height="38" fill="#3b82f6" clip-path="url(#header-clip)"/>
    <text x="130" y="24" text-anchor="middle" class="text-title">① 运行时监测 (Runtime)</text>

    <!-- 内部子卡片 A: ScanEngine (Y=54) -->
    <g transform="translate(20, 54)">
      <rect width="220" height="48" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="110" y="20" text-anchor="middle" class="text-lbl" fill="#1d4ed8">ScanEngine 内核</text>
      <text x="110" y="36" text-anchor="middle" class="text-sub" fill="#2563eb">10ms 高频调度 · EDF 实时算法</text>
    </g>
    <!-- 纵向正交单线对齐 (X=130, Y=102 -> 116) -->
    <path d="M 130 102 L 130 116" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

    <!-- 内部子卡片 B: 8项核心指标 (Y=116) -->
    <g transform="translate(20, 116)">
      <rect width="220" height="48" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
      <text x="110" y="20" text-anchor="middle" class="text-lbl" fill="#1e293b">8 项核心硬时延指标</text>
      <text x="110" y="36" text-anchor="middle" class="text-code" fill="#64748b">lag · drift · miss · GC pause</text>
    </g>
    <!-- 纵向正交单线对齐 (X=130, Y=164 -> 178) -->
    <path d="M 130 164 L 130 178" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

    <!-- 内部子卡片 C: 判定门控 (Y=178) -->
    <g transform="translate(20, 178)">
      <polygon points="110,0 220,24 110,48 0,24" fill="#ffffff" stroke="#3b82f6" stroke-width="1.2"/>
      <text x="110" y="28" text-anchor="middle" class="text-lbl" fill="#1d4ed8">SLA 门控校验</text>
    </g>
    <!-- 纵向正交单线对齐 (X=130, Y=226 -> 248) -->
    <path d="M 130 226 L 130 248" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

    <!-- 内部子卡片 D: 告警触发 (Y=248) -->
    <g transform="translate(20, 248)">
      <rect width="220" height="38" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <circle cx="24" cy="19" r="5" fill="#ef4444" class="pulse-light"/>
      <text x="124" y="23" text-anchor="middle" class="text-lbl" fill="#991b1b">指标超标 ➔ 动态熔断告警</text>
    </g>
  </g>

  <!-- ==================== CONTAINER 2: 可观测 API (X=350, Y=50) ==================== -->
  <!-- 严格正交单条水平直线 (Y=200) -->
  <path d="M 300 200 L 350 200" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(350, 50)" filter="url(#shadow)">
    <rect width="260" height="300" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <rect width="260" height="38" fill="#10b981" clip-path="url(#header-clip)"/>
    <text x="130" y="24" text-anchor="middle" class="text-title">② 可观测 API (Observability)</text>

    <!-- Diagnostics 核心数据看板区 (Y=54) -->
    <g transform="translate(15, 54)">
      <rect width="230" height="230" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
      <text x="115" y="22" text-anchor="middle" class="text-lbl" fill="#047857">Diagnostics 统一暴露接口</text>
      
      <rect x="15" y="34" width="200" height="24" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
      <text x="115" y="50" text-anchor="middle" class="text-code" fill="#065f46">GET /diagnostics/scan-engine</text>
      
      <line x1="15" y1="72" x2="215" y2="72" stroke="#bbf7d0" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="115" y="90" text-anchor="middle" class="text-sub" fill="#475569" font-weight="700">SLA 核心门控极限安全防线</text>
      
      <!-- 列表行 A (Y=104) -->
      <g transform="translate(15, 104)">
        <rect width="200" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="10" y="16" class="text-code" fill="#334155">scan_lag_p95_ms</text>
        <text x="190" y="16" text-anchor="end" class="text-code" fill="#b45309" font-weight="800">&lt; 100ms</text>
      </g>
      <!-- 列表行 B (Y=134) -->
      <g transform="translate(15, 134)">
        <rect width="200" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="10" y="16" class="text-code" fill="#334155">miss_deadline</text>
        <text x="190" y="16" text-anchor="end" class="text-code" fill="#15803d" font-weight="800">= 0</text>
      </g>
      <!-- 列表行 C (Y=164) -->
      <g transform="translate(15, 164)">
        <rect width="200" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="10" y="16" class="text-code" fill="#334155">gc_pause_max_ms</text>
        <text x="190" y="16" text-anchor="end" class="text-code" fill="#b45309" font-weight="800">&lt; 20ms</text>
      </g>

      <!-- 实时状态指标映射 -->
      <rect x="15" y="198" width="200" height="24" rx="4" fill="#ffffff" stroke="#bbf7d0"/>
      <text x="25" y="214" class="text-code" fill="#047857">状态导出域 ➔</text>
      <text x="190" y="214" text-anchor="end" class="text-code" fill="#065f46" font-weight="800">sla_warnings[]</text>
    </g>
  </g>

  <!-- ==================== CONTAINER 3: CI / Soak 验证 (X=660, Y=50) ==================== -->
  <!-- 严格正交单条水平直线 (Y=200) -->
  <path d="M 610 200 L 660 200" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(660, 50)" filter="url(#shadow)">
    <rect width="260" height="300" rx="12" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
    <rect width="260" height="38" fill="#f97316" clip-path="url(#header-clip)"/>
    <text x="130" y="24" text-anchor="middle" class="text-title">③ 自动化质量回归 (CI/Soak)</text>

    <!-- 子内容 A: 万Tag压测 (Y=54) -->
    <g transform="translate(15, 54)">
      <rect width="230" height="50" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
      <text x="12" y="20" class="text-lbl" fill="#c2410c">■ 万 Tag 极端高并发压测</text>
      <text x="12" y="38" class="text-sub" fill="#ea580c">100设备×100点位 · P95 1.25ms极限承载</text>
    </g>

    <!-- 子内容 B: Soak长稳 (Y=116) -->
    <g transform="translate(15, 116)">
      <rect width="230" height="50" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
      <text x="12" y="20" class="text-lbl" fill="#c2410c">■ 72 小时现场长稳 Soak 演练</text>
      <text x="12" y="38" class="text-sub" fill="#ea580c">30s 极速卡点短测 + 72h 框架常驻流</text>
    </g>

    <!-- 双标准纵向正交平行对齐线 (X=115,145, Y=166 -> 186) -->
    <path d="M 115 166 L 115 186" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <path d="M 145 166 L 145 186" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

    <!-- 子内容 C: CI 五 gate 自动化卡点 (Y=186) -->
    <g transform="translate(15, 186)">
      <rect width="230" height="64" rx="8" fill="#f97316" stroke="#ea580c" stroke-width="1.2"/>
      <text x="115" y="24" text-anchor="middle" class="text-lbl" fill="#ffffff">CI 流流水线五级 Gate 自动化卡点</text>
      <rect x="15" y="36" width="200" height="20" rx="4" fill="#ffffff" fill-opacity="0.18"/>
      <text x="115" y="50" text-anchor="middle" class="text-code" fill="#fff7ed">拦截指令: make test-soak-short</text>
    </g>

    <!-- 阻止发布提示文本 -->
    <text x="130" y="282" text-anchor="middle" class="text-sub" fill="#94a3b8">检测失败自动阻断发布与制品拒绝</text>
  </g>

  <!-- ==================== 双端对称：底部边缘正交反馈回路 (SLA 回攻闭环) ==================== -->
  <!-- 
    极客规范级优化：
    1. 起点(Start)：绝对锚定在 模块③ 正下方的几何外边缘 (X=790, Y=350)。
    2. 下潜走线通道：直接正交垂直向下落入下方 415px 独立平面层，绝不向右穿出或产生冗余拐角。
    3. 终点(End)：正交对齐至 模块① 正下方的几何外边缘 (X=170, Y=350)，采用垂直向上(垂直指北)的 marker 汇入。
    4. 整体对称平衡：全线仅通过 3 个精准的 90° 直角转弯连接，起点、终点在 Y=350 完全等高水平对称，线段绝无任何块体内穿模。
  -->
  <path d="M 790 350 L 790 415 L 170 415 L 170 350"
        fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-blue)"/>
  
  <!-- 闭环正交中央高亮状态指示舱（严格水平正交居中放置于反馈通道上） -->
  <g transform="translate(370, 404)">
    <rect width="220" height="22" rx="11" fill="#2563eb"/>
    <text x="110" y="15" text-anchor="middle" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="11" font-weight="800" fill="#ffffff" letter-spacing="0.5px">质量回归闭环正交线 ➔ 反向优化内核</text>
  </g>

  <!-- 沿底部对称正交轨迹巡航的高亮动态仿真量子光点 -->
  <circle r="4" fill="#3b82f6">
    <animateMotion dur="4s" repeatCount="indefinite" rotate="auto"
                   path="M 790 350 L 790 415 L 170 415 L 170 350"/>
  </circle>
</svg>
