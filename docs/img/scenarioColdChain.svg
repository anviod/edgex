<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    
    <linearGradient id="grad-sky" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#bae6fd"/><stop offset="100%" stop-color="#f0f9ff"/></linearGradient>
    <linearGradient id="grad-red" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fecaca"/><stop offset="100%" stop-color="#fef2f2"/></linearGradient>
    <linearGradient id="grad-green" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#bbf7d0"/><stop offset="100%" stop-color="#f0fdf4"/></linearGradient>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#dc2626"/>
    </marker>

    <style>
      .title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .group-title { font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val-blue { fill:#0284c7; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:24px; }
      .val-red { fill:#dc2626; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:24px; }
      .chart-lbl { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:11px; font-weight:600; }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#0ea5e9" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="title">冷链物流监控：全程温度追踪与脱冷告警系统</text>
    <text y="24" class="subtitle">极致工整纵向四级栅格基准线设计 · 跨区域信号全直连无交叉</text>
  </g>

  <g transform="translate(70, 0)">
    <rect x="0" y="130" width="260" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="260" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="260" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#0284c7">■ 边缘冷链感知层</text>

    <g transform="translate(15, 175)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#0ea5e9"/>
      <rect x="15" y="15" width="36" height="40" rx="4" fill="#e0f2fe"/>
      <text x="33" y="41" text-anchor="middle" fill="#0284c7" font-size="20">❄</text>
      <text x="64" y="32" class="lbl">冷藏车辆监测</text>
      <text x="64" y="52" class="code">GPS + Modbus-RTU</text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#0ea5e9"/>
      <text x="20" y="28" class="lbl">冷库多温区监测</text>
      <text x="20" y="48" class="code">Zone T1/T2: 采集激活</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#0ea5e9"/>
      <text x="20" y="28" class="lbl">实时位置与轨迹</text>
      <text x="20" y="48" class="code">Lat/Lng Stream → MQTT</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#0ea5e9"/>
      <text x="20" y="28" class="lbl">厢门状态传感器</text>
      <text x="20" y="48" class="code">Status: Secure Closed</text>
    </g>
  </g>


  <path d="M 330 210 H 490" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" class="dash-line"/>
  <path d="M 330 320 H 490" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" class="dash-line"/>
  <path d="M 330 430 H 490" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" class="dash-line"/>
  <path d="M 330 540 H 490" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" class="dash-line"/>

  <circle r="4" fill="#0ea5e9"><animateMotion dur="2.2s" repeatCount="indefinite" path="M 330 210 H 490"/></circle>
  <circle r="4" fill="#0ea5e9"><animateMotion dur="1.8s" repeatCount="indefinite" path="M 330 320 H 490"/></circle>
  <circle r="4" fill="#0ea5e9"><animateMotion dur="2.5s" repeatCount="indefinite" path="M 330 430 H 490"/></circle>
  <circle r="4" fill="#0ea5e9"><animateMotion dur="2.0s" repeatCount="indefinite" path="M 330 540 H 490"/></circle>


  <g transform="translate(490, 0)">
    <rect x="0" y="130" width="420" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="420" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="420" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#1e3a8a">■ 边缘冷链监控分析引擎 (Edge Analytics)</text>

    <g transform="translate(25, 175)">
      <rect width="370" height="70" rx="10" fill="url(#grad-sky)" stroke="#0284c7" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">温度时序判定算法</text>
      <text x="25" y="50" class="code">Rule: If T &gt; -15°C continuous for 5 mins</text>
    </g>

    <g transform="translate(25, 285)">
      <rect width="370" height="70" rx="10" fill="url(#grad-red)" stroke="#dc2626" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl" fill="#991b1b">实时触发异常：脱冷事件生成</text>
      <text x="25" y="50" class="code" fill="#a51d24">Exception: status_code = COLD_BREAK_ALERT</text>
    </g>

    <g transform="translate(25, 395)">
      <rect width="370" height="70" rx="10" fill="url(#grad-green)" stroke="#16a34a" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">本地高可靠时序存储</text>
      <text x="25" y="50" class="code">Storage: Local SQLite / Flash Ring Buffer</text>
    </g>

    <g transform="translate(25, 505)">
      <rect width="370" height="70" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">冷链交接责任链追溯</text>
      <text x="25" y="50" class="code">Trace: Device Handshake Cryptographic Chain</text>
    </g>
  </g>


  <path d="M 910 210 H 1050" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 910 320 H 1050" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <path d="M 910 430 H 1050" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 910 540 H 1050" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <circle r="3.5" fill="#3b82f6"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 910 210 H 1050"/></circle>
  <circle r="3.5" fill="#ef4444"><animateMotion dur="1.0s" repeatCount="indefinite" path="M 910 320 H 1050"/></circle>
  <circle r="3.5" fill="#3b82f6"><animateMotion dur="1.6s" repeatCount="indefinite" path="M 910 430 H 1050"/></circle>
  <circle r="3.5" fill="#3b82f6"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 910 540 H 1050"/></circle>


  <g transform="translate(1050, 0)">
    <rect x="0" y="130" width="280" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="280" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="280" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#059669">■ 云端集中追踪层</text>

    <g transform="translate(15, 175)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="18" y="24" class="chart-lbl">当前车辆全局平均温度</text>
      <text x="18" y="52" class="val-blue">-18.2 <tspan fill="#64748b" font-size="14" font-weight="500">°C</tspan></text>
      <circle cx="225" cy="35" r="5" fill="#22c55e"/>
    </g>

    <g transform="translate(15, 285)">
      <rect width="250" height="70" rx="10" fill="#fff5f5" stroke="#fecaca" stroke-width="1.5"/>
      <text x="18" y="24" class="chart-lbl" fill="#991b1b">即时通知：脱冷事件 #2847</text>
      <text x="18" y="52" class="val-red">SMS / Email 报出</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="16" y="22" class="chart-lbl">24H 历史温度波动曲线</text>
      <polyline points="25,52 55,42 85,46 115,35 145,40 175,28 205,32 235,24" fill="none" stroke="#0284c7" stroke-width="2"/>
      <circle cx="235" cy="24" r="3" fill="#0284c7"/>
    </g>

    <g transform="translate(15, 505)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="18" y="25" class="chart-lbl">国家医药物流 GSP 合规链</text>
      <text x="18" y="48" class="code" fill="#16a34a">✓ Immutable PDF Record</text>
    </g>
  </g>
</svg>
