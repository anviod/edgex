<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="780" viewBox="0 0 1400 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ctrl_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    
    <linearGradient id="hub_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <linearGradient id="grad-teal" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ccfbf1"/><stop offset="100%" stop-color="#f0fdf4"/></linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e0f2fe"/><stop offset="100%" stop-color="#f0f9ff"/></linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f3e8ff"/><stop offset="100%" stop-color="#faf5ff"/></linearGradient>
    <linearGradient id="grad-orange" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffedd5"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>

    <marker id="arrow_teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow_blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrow_purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow_orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#d97706"/>
    </marker>

    <style>
      .main-title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .section-subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .section-title { fill:#475569; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:2px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val { fill:#0f172a; font-family:'Segoe UI',sans-serif; font-weight:700; font-size:14px; }
      .pulse { animation: blink 1.2s ease-in-out infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="780" fill="url(#ctrl_bg)"/>
  <rect x="25" y="25" width="1350" height="730" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#0f766e" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="main-title">多设备智能联动控制：跨协议物联网编排与产线楼宇协同数字孪生系统</text>
    <text y="24" class="section-subtitle">Edgex 边缘计算网关 · 采集控制通道横向单条直线全对齐零交叉流转</text>
  </g>

  <line x1="330" y1="120" x2="330" y2="720" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1050" y1="120" x2="1050" y2="720" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>
  
  <text x="177" y="125" text-anchor="middle" class="section-title">■ 智能外围设备层 (INPUT)</text>
  <text x="690" y="125" text-anchor="middle" class="section-title">■ 跨协议规则编排引擎 (ENGINE)</text>
  <text x="1190" y="125" text-anchor="middle" class="section-title">■ 实时执行与反馈层 (OUTPUT)</text>

  <g transform="translate(50, 165)" filter="url(#shadow)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="1.5"/>
    <rect width="6" height="70" rx="3" fill="#0f766e"/>
    <text x="20" y="28" class="lbl">PLC 边缘主控器</text>
    <text x="20" y="50" class="code">Protocol: Modbus-TCP / S7</text>
  </g>
  <g transform="translate(515, 165)">
    <rect width="370" height="70" rx="10" fill="url(#grad-teal)" stroke="#0f766e" stroke-width="1.5"/>
    <text x="20" y="28" class="lbl">Step 1: 触发 · 产线状态状态机变更</text>
    <text x="20" y="50" class="code">Event: emit("line_start") ➔ Sync Core</text>
  </g>
  <g transform="translate(1075, 165)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="1.5"/>
    <text x="20" y="28" class="section-subtitle" fill="#0f766e">产线状态运行反馈</text>
    <text x="20" y="52" class="val" fill="#0f766e">PLC ➔ RUNNING</text>
    <circle cx="225" cy="45" r="5" fill="#22c55e" class="pulse"/>
  </g>
  <path d="M 300 200 H 515" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow_teal)" class="dash-line"/>
  <path d="M 885 200 H 1075" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow_teal)"/>


  <g transform="translate(50, 285)" filter="url(#shadow)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
    <rect width="6" height="70" rx="3" fill="#0284c7"/>
    <text x="20" y="28" class="lbl">BACnet 楼宇自控系统</text>
    <text x="20" y="50" class="code">Protocol: BACnet / IP Bus</text>
  </g>
  <g transform="translate(515, 285)">
    <rect width="370" height="70" rx="10" fill="url(#grad-blue)" stroke="#0284c7" stroke-width="1.5"/>
    <text x="20" y="28" class="lbl">Step 2: 联动 · 负压隔离间新风变频加压</text>
    <text x="20" y="50" class="code">Action: hvac.setMode("Auto_Speed")</text>
  </g>
  <g transform="translate(1075, 285)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
    <text x="20" y="28" class="section-subtitle" fill="#0284c7">环控加压反馈中心</text>
    <text x="20" y="52" class="val" fill="#014f86">HVAC: 自动风速调配</text>
  </g>
  <path d="M 300 320 H 515" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow_blue)" class="dash-line"/>
  <path d="M 885 320 H 1075" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow_blue)"/>


  <g transform="translate(50, 405)" filter="url(#shadow)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
    <rect width="6" height="70" rx="3" fill="#7c3aed"/>
    <text x="20" y="28" class="lbl">KNX 智能照明系统</text>
    <text x="20" y="50" class="code">Protocol: KNX Twisted Pair</text>
  </g>
  <g transform="translate(515, 405)">
    <rect width="370" height="70" rx="10" fill="url(#grad-purple)" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="20" y="28" class="lbl">Step 3: 调光 · 开启作业区高亮模式</text>
    <text x="20" y="50" class="code">Action: knx.dimming(Target_Value: 80)</text>
  </g>
  <g transform="translate(1075, 405)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="20" y="28" class="section-subtitle" fill="#7c3aed">区域光强状态网格</text>
    <text x="20" y="52" class="val" fill="#5b21b6">工作面照度 ➔ 80%</text>
  </g>
  <path d="M 300 440 H 515" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow_purple)" class="dash-line"/>
  <path d="M 885 440 H 1075" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow_purple)"/>


  <g transform="translate(50, 525)" filter="url(#shadow)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
    <rect width="6" height="70" rx="3" fill="#d97706"/>
    <text x="20" y="28" class="lbl">RMW 安全防护模块</text>
    <text x="20" y="50" class="code">Protocol: Safety Interlock</text>
  </g>
  <g transform="translate(515, 525)">
    <rect width="370" height="70" rx="10" fill="url(#grad-orange)" stroke="#d97706" stroke-width="1.5"/>
    <text x="20" y="28" class="lbl">Step 4: 校验 · 联动安全合规性终审判定</text>
    <text x="20" y="50" class="code">Check: if(global_safety == true) ➔ commit</text>
  </g>
  <g transform="translate(1075, 525)">
    <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
    <text x="20" y="28" class="section-subtitle" fill="#d97706">中央拓扑分布式统一校验</text>
    <text x="20" y="52" class="val" fill="#9a3412">跨协议编排原子级下发成功</text>
  </g>
  <path d="M 300 560 H 515" stroke="#d97706" stroke-width="2" marker-end="url(#arrow_orange)" class="dash-line"/>
  <path d="M 885 560 H 1075" stroke="#d97706" stroke-width="2" marker-end="url(#arrow_orange)"/>


  <rect x="490" y="145" width="420" height="475" rx="16" fill="none" stroke="url(#hub_bg)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  
  <path d="M 490,200 Q 450,380 490,560" fill="none" stroke="url(#hub_bg)" stroke-width="2" opacity="0.15"/>
  <path d="M 910,200 Q 950,380 910,560" fill="none" stroke="url(#hub_bg)" stroke-width="2" opacity="0.15"/>

  <circle r="4" fill="#0f766e"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 300 200 H 515"/></circle>
  <circle r="4" fill="#0284c7"><animateMotion dur="1.6s" repeatCount="indefinite" path="M 300 320 H 515"/></circle>
  <circle r="4" fill="#7c3aed"><animateMotion dur="1.1s" repeatCount="indefinite" path="M 300 440 H 515"/></circle>
  <circle r="4" fill="#d97706"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 300 560 H 515"/></circle>

  <circle r="3.5" fill="#0f766e"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 885 200 H 1075"/></circle>
  <circle r="3.5" fill="#0284c7"><animateMotion dur="1.2s" repeatCount="indefinite" path="M 885 320 H 1075"/></circle>
  <circle r="3.5" fill="#7c3aed"><animateMotion dur="1.7s" repeatCount="indefinite" path="M 885 440 H 1075"/></circle>
  <circle r="3.5" fill="#d97706"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 885 560 H 1075"/></circle>
</svg>
