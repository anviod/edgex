<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
    
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#fef3c7"/></linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ddd6fe"/><stop offset="100%" stop-color="#f5f3ff"/></linearGradient>
    <linearGradient id="grad-emerald" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a7f3d0"/><stop offset="100%" stop-color="#ecfdf5"/></linearGradient>
    <linearGradient id="grad-orange" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffedd5"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>

    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#d97706"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#7c3aed"/>
    </marker>

    <style>
      .title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .group-title { font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val { fill:#0f172a; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:24px; }
      .unit { fill:#64748b; font-size:13px; font-weight:500; }
      .chart-lbl { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:11px; font-weight:600; }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#f59e0b" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="title">光伏逆变器聚合：多机数据汇总与发电量统计系统</text>
    <text y="24" class="subtitle">高级纵向四级精密对称排版 · 能源数字孪生管道横向直连无交错流转</text>
  </g>

  <g transform="translate(70, 0)">
    <rect x="0" y="130" width="260" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="260" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="260" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#d97706">■ 光伏逆变与计量设备采集</text>

    <g transform="translate(15, 175)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#f59e0b"/>
      <text x="20" y="28" class="lbl">INV-01 逆变器节点</text>
      <text x="20" y="48" class="code">Protocol: Modbus P=45.2 kW</text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#f59e0b"/>
      <text x="20" y="28" class="lbl">INV-02 逆变器节点</text>
      <text x="20" y="48" class="code">Protocol: Modbus P=43.8 kW</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#f59e0b"/>
      <text x="20" y="28" class="lbl">INV-03 逆变器节点</text>
      <text x="20" y="48" class="code">Protocol: Modbus P=44.1 kW</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1.2"/>
      <rect width="6" height="70" rx="3" fill="#64748b"/>
      <text x="20" y="28" class="lbl">关口计量关口电表</text>
      <text x="20" y="48" class="code">Protocol: DL/T645 总发电量</text>
    </g>
  </g>


  <path d="M 330 210 H 490" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)" class="dash-line"/>
  <path d="M 330 320 H 490" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)" class="dash-line"/>
  <path d="M 330 430 H 490" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)" class="dash-line"/>
  <path d="M 330 540 H 490" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)" class="dash-line"/>

  <circle r="4" fill="#f59e0b"><animateMotion dur="1.2s" repeatCount="indefinite" path="M 330 210 H 490"/></circle>
  <circle r="4" fill="#f59e0b"><animateMotion dur="1.8s" repeatCount="indefinite" path="M 330 320 H 490"/></circle>
  <circle r="4" fill="#f59e0b"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 330 430 H 490"/></circle>
  <circle r="4" fill="#f59e0b"><animateMotion dur="1.6s" repeatCount="indefinite" path="M 330 540 H 490"/></circle>


  <g transform="translate(490, 0)">
    <rect x="0" y="130" width="420" height="510" rx="14" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="8 5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="420" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="420" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#6d28d9">■ Virtual Shadow 虚拟物模型内核</text>

    <g transform="translate(25, 175)">
      <rect width="370" height="70" rx="10" fill="url(#grad-purple)" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">动态全场输出功率实时聚合</text>
      <text x="25" y="50" class="code">Expr: P_total = sum(inv_01.P, inv_02.P, inv_03.P)</text>
    </g>

    <g transform="translate(25, 285)">
      <rect width="370" height="70" rx="10" fill="url(#grad-amber)" stroke="#d97706" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">综合组串转换效率动态精算</text>
      <text x="25" y="50" class="code">Expr: efficiency = P_total / total_rated_power</text>
    </g>

    <g transform="translate(25, 395)">
      <rect width="370" height="70" rx="10" fill="url(#grad-emerald)" stroke="#10b981" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">实时功率时序面积数学积分</text>
      <text x="25" y="50" class="code">Expr: E_day = integrate(P_total, dTime)</text>
    </g>

    <g transform="translate(25, 505)">
      <rect width="370" height="70" rx="10" fill="url(#grad-orange)" stroke="#f97316" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">标准时序数字孪生指标建模包装</text>
      <text x="25" y="50" class="code">Expr: MapTo → { ts, total_power, daily_energy }</text>
    </g>
  </g>


  <path d="M 910 210 H 1050" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <path d="M 910 320 H 1050" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <path d="M 910 430 H 1050" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <path d="M 910 540 H 1050" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <circle r="3.5" fill="#8b5cf6"><animateMotion dur="1.1s" repeatCount="indefinite" path="M 910 210 H 1050"/></circle>
  <circle r="3.5" fill="#8b5cf6"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 910 320 H 1050"/></circle>
  <circle r="3.5" fill="#8b5cf6"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 910 430 H 1050"/></circle>
  <circle r="3.5" fill="#8b5cf6"><animateMotion dur="1.7s" repeatCount="indefinite" path="M 910 540 H 1050"/></circle>


  <g transform="translate(1050, 0)">
    <rect x="0" y="130" width="280" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="280" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="280" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#1f2937">■ 能源看板与北向上报</text>

    <g transform="translate(15, 175)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">实时综合发电总功率</text>
      <text x="15" y="52" class="val" fill="#d97706">133.1 <tspan class="unit">kW</tspan></text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">电站今日综合逆变效率</text>
      <text x="15" y="52" class="val" fill="#7c3aed">92.4 <tspan class="unit">%</tspan></text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">今日累计积分发电量</text>
      <text x="15" y="52" class="val" fill="#10b981">648.5 <tspan class="unit">kWh</tspan></text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="250" height="70" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl" fill="#b45309">集中式能源管理平台 (EMS)</text>
      <text x="15" y="48" class="code" fill="#d97706">MQTT Pub: telemetry/solar/report</text>
    </g>
  </g>
</svg>
