<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <filter id="card_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.04"/>
    </filter>
    
    <filter id="edge_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="clip_rule_amber"><rect width="360" height="80" rx="12"/></clipPath>
    <clipPath id="clip_rule_red"><rect width="360" height="80" rx="12"/></clipPath>

    <linearGradient id="grad_green" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#f0fdf4"/></linearGradient>
    <linearGradient id="grad_red" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fee2e2"/><stop offset="100%" stop-color="#fef2f2"/></linearGradient>

    <linearGradient id="title_amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="title_red" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fee2e2"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>

    <marker id="arrow_amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#d97706"/>
    </marker>
    <marker id="arrow_green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow_red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#dc2626"/>
    </marker>

    <style>
      .main-title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .section-subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .section-title { fill:#475569; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:2px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val { fill:#0f172a; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:24px; }
      .unit { fill:#64748b; font-size:13px; font-weight:500; }
      .chart-lbl { fill:#475569; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:12px; font-weight:600; }
      .pulse { animation: blink 1.2s ease-in-out infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#bg_gradient)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#f59e0b" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="main-title">边缘实时决策中心：质量在线检测与安全生产联锁毫秒级响应引擎</text>
    <text y="24" class="section-subtitle">EdgeX 边缘计算网关· 决策计算数据管道横向单条直线全对齐零交叉流转</text>
  </g>

  <line x1="330" y1="120" x2="330" y2="640" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1020" y1="120" x2="1020" y2="640" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>
  
  <text x="177" y="125" text-anchor="middle" class="section-title">■ 现场传感输入层 (INPUT)</text>
  <text x="675" y="125" text-anchor="middle" class="section-title">■ 边缘实时决策引擎 (ENGINE)</text>
  <text x="1195" y="125" text-anchor="middle" class="section-title">■ 闭环控制执行层 (OUTPUT)</text>

  <g transform="translate(50, 175)" filter="url(#card_shadow)">
    <rect width="250" height="80" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect width="6" height="80" rx="3" fill="#f59e0b"/>
    <g transform="translate(20, 15)">
      <path d="M0 5 H15 M5 0 L0 5 L5 10 M35 5 H50 M45 0 L50 5 L45 10" stroke="#d97706" stroke-width="1.5" fill="none"/>
      <rect x="18" y="1" width="14" height="8" fill="#fef3c7" stroke="#d97706"/>
      <circle cx="195" cy="22" r="5" fill="#22c55e" class="pulse"/>
    </g>
    <text x="20" y="46" class="lbl">激光尺寸传感器 dim_sensor</text>
    <text x="20" y="66" class="code">实时采样值: 12.03 mm [高频采样]</text>
  </g>
  <g transform="translate(490, 175)" filter="url(#card_shadow)">
    <rect width="370" height="80" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <g clip-path="url(#clip_rule_amber)"><rect width="370" height="24" fill="url(#title_amber)"/></g>
    <text x="20" y="17" style="font-size:11px; font-weight:700; fill:#b45309;">质量动态判定规则 (Layer 1)</text>
    <text x="20" y="46" class="lbl">本地 expr 表达式: |dim - 12| &lt; 0.05</text>
    <text x="20" y="66" class="code">零上行延迟评估结果: TRUE (符合工艺标准)</text>
  </g>
  <g transform="translate(1050, 175)" filter="url(#card_shadow)">
    <rect width="270" height="80" rx="12" fill="url(#grad_green)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="15" y="24" class="chart-lbl">当前工件质量综合状态</text>
    <text x="15" y="54" class="val" fill="#166534">PASS <tspan class="unit">自动放行</tspan></text>
    <path d="M215 42 L215 56 Q215 65 225 68 Q235 65 235 56 L235 42 Z" fill="#10b981" opacity="0.2"/>
    <path d="M220 52 L224 56 L231 48" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <path d="M 300 215 H 490" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow_amber)" class="dash-line"/>
  <path d="M 860 215 H 1050" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow_green)"/>


  <g transform="translate(50, 385)" filter="url(#card_shadow)">
    <rect width="250" height="80" rx="12" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <rect width="6" height="80" rx="3" fill="#ef4444"/>
    <g transform="translate(20, 15)">
      <path d="M0 20 A 20 20 0 0 1 40 20" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2"/>
      <circle cx="20" cy="20" r="5" fill="#ef4444"/>
    </g>
    <text x="75" y="36" class="lbl">区域入侵 proximity_zone</text>
    <text x="20" y="64" class="code">当前物理状态: occupied (危险区受侵入)</text>
  </g>
  <g transform="translate(490, 385)" filter="url(#card_shadow)">
    <rect width="370" height="80" rx="12" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <g clip-path="url(#clip_rule_red)"><rect width="370" height="24" fill="url(#title_red)"/></g>
    <text x="20" y="17" style="font-size:11px; font-weight:700; fill:#991b1b;">安全保护联锁规则 (Layer 2)</text>
    <text x="20" y="46" class="lbl">硬实时判定: zone == occupied</text>
    <text x="20" y="66" class="code">特权级规则直接中断响应: TRIGGERED</text>
  </g>
  <g transform="translate(1050, 385)" filter="url(#card_shadow)">
    <rect width="270" height="80" rx="12" fill="url(#grad_red)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="15" y="24" class="chart-lbl">现场机组动力控制状态</text>
    <text x="15" y="54" class="val" fill="#c2410c">E-STOP <tspan class="unit">紧急制动</tspan></text>
    <circle cx="225" cy="50" r="12" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="225" cy="50" r="7" fill="#ef4444" class="pulse"/>
  </g>
  <path d="M 300 425 H 490" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow_red)" class="dash-line"/>
  <path d="M 860 425 H 1050" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow_red)"/>


  <rect x="465" y="145" width="420" height="350" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>
  <rect x="465" y="515" width="420" height="26" rx="13" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="675" y="532" text-anchor="middle" style="font-size:11px; fill:#b45309; font-weight:700;">毫秒级边缘异步非阻塞闭环控制总线</text>

  <g transform="translate(560, 580)" filter="url(#card_shadow)">
    <rect width="280" height="42" rx="21" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <circle cx="32" cy="21" r="6" fill="#22c55e" class="pulse"/>
    <text x="160" y="26" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="800" font-family="'Segoe UI','Microsoft YaHei',sans-serif" letter-spacing="0.5px">全链路端到端决策延迟 &lt; 5ms</text>
  </g>

  <circle r="4" fill="#f59e0b" filter="url(#edge_glow)"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 300 215 H 490"/></circle>
  <circle r="4" fill="#22c55e" filter="url(#edge_glow)"><animateMotion dur="1.0s" repeatCount="indefinite" path="M 860 215 H 1050"/></circle>

  <circle r="4" fill="#ef4444" filter="url(#edge_glow)"><animateMotion dur="1.2s" repeatCount="indefinite" path="M 300 425 H 490"/></circle>
  <circle r="4" fill="#ef4444" filter="url(#edge_glow)"><animateMotion dur="0.9s" repeatCount="indefinite" path="M 860 425 H 1050"/></circle>
</svg>
