<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
    
    <linearGradient id="grad-sky" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#bae6fd"/><stop offset="100%" stop-color="#f0f9ff"/></linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ddd6fe"/><stop offset="100%" stop-color="#f5f3ff"/></linearGradient>
    <linearGradient id="grad-emerald" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a7f3d0"/><stop offset="100%" stop-color="#ecfdf5"/></linearGradient>
    <linearGradient id="grad-rose" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fecdd3"/><stop offset="100%" stop-color="#fff1f2"/></linearGradient>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c7d2fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>

    <marker id="arrow-sky" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#10b981"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#f43f5e"/>
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#4f46e5"/>
    </marker>

    <style>
      .title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .group-title { font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .chart-lbl { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:11px; font-weight:600; }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#8b5cf6" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="title">多协议网关转换：Modbus/BACnet/KNX/IEC 104 ↔ MQTT/OPC UA</text>
    <text y="24" class="subtitle">高阶工业级纵向四级栅格化数据管道 · 双向控制流横向单条直线全对齐无交错设计</text>
  </g>

  <g transform="translate(70, 0)">
    <rect x="0" y="130" width="260" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="260" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="260" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#0ea5e9">■ 南向多源协议采集层</text>

    <g transform="translate(15, 175)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#0ea5e9"/>
      <text x="20" y="28" class="lbl">Modbus RTU 驱动接口</text>
      <text x="20" y="48" class="code">Phys: RS485 智能仪表总线</text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#8b5cf6"/>
      <text x="20" y="28" class="lbl">BACnet/IP 楼宇控制驱动</text>
      <text x="20" y="48" class="code">Phys: 楼宇自控 DDC 控制器</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#10b981"/>
      <text x="20" y="28" class="lbl">KNX 智能照明控制系统</text>
      <text x="20" y="48" class="code">Phys: 现场照明/窗帘网关模块</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#f43f5e" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#f43f5e"/>
      <text x="20" y="28" class="lbl">IEC 60870-5-104 电力规约</text>
      <text x="20" y="48" class="code">Phys: 变电站保护及电力设备</text>
    </g>
  </g>


  <path d="M 330 210 H 490" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-sky)" class="dash-line"/>
  <path d="M 330 320 H 490" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" class="dash-line"/>
  <path d="M 330 430 H 490" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-emerald)" class="dash-line"/>
  <path d="M 330 540 H 490" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-rose)" class="dash-line"/>

  <circle r="4" fill="#0ea5e9"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 330 210 H 490"/></circle>
  <circle r="4" fill="#8b5cf6"><animateMotion dur="2.0s" repeatCount="indefinite" path="M 330 320 H 490"/></circle>
  <circle r="4" fill="#10b981"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 330 430 H 490"/></circle>
  <circle r="4" fill="#f43f5e"><animateMotion dur="1.8s" repeatCount="indefinite" path="M 330 540 H 490"/></circle>


  <g transform="translate(490, 0)">
    <rect x="0" y="130" width="420" height="510" rx="14" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="8 5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="420" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="420" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#6d28d9">■ 核心协议适配与数据抽象层</text>

    <g transform="translate(25, 175)">
      <rect width="370" height="70" rx="10" fill="url(#grad-sky)" stroke="#0ea5e9" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">南向异构通信驱动适配</text>
      <text x="25" y="50" class="code">Engine: Multiplexing Protocol Driver → Cache</text>
    </g>

    <g transform="translate(25, 285)">
      <rect width="370" height="70" rx="10" fill="url(#grad-purple)" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">物理点位向虚拟标签的静态映射</text>
      <text x="25" y="50" class="code">Mapping: Modbus Address 40001 → tag.temp_01</text>
    </g>

    <g transform="translate(25, 395)">
      <rect width="370" height="70" rx="10" fill="url(#grad-emerald)" stroke="#10b981" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">统一时序元数据架构抽象</text>
      <text x="25" y="50" class="code">Schema: { tag_id, value, quality, timestamp }</text>
    </g>

    <g transform="translate(25, 505)">
      <rect width="370" height="70" rx="10" fill="url(#grad-rose)" stroke="#f43f5e" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">标准化北向共享发布核心</text>
      <text x="25" y="50" class="code">Pipeline: Tag Stream Refactoring → MQTT / OPC UA</text>
    </g>
  </g>


  <path d="M 910 210 H 1050" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <path d="M 910 320 H 1050" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <path d="M 910 430 H 1050" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-sky)"/>
  <path d="M 910 540 H 1050" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-emerald)"/>

  <circle r="3.5" fill="#4f46e5"><animateMotion dur="1.1s" repeatCount="indefinite" path="M 910 210 H 1050"/></circle>
  <circle r="3.5" fill="#8b5cf6"><animateMotion dur="1.6s" repeatCount="indefinite" path="M 910 320 H 1050"/></circle>
  <circle r="3.5" fill="#0ea5e9"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 910 430 H 1050"/></circle>
  <circle r="3.5" fill="#10b981"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 910 540 H 1050"/></circle>


  <g transform="translate(1050, 0)">
    <rect x="0" y="130" width="280" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="280" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="280" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#1e293b">■ 北向标准开放上报层</text>

    <g transform="translate(15, 175)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">MQTT 高吞吐发布中心</text>
      <text x="15" y="48" class="code" fill="#4f46e5">Pub: factory/line_01/telemetry</text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">OPC UA 面向对象信息模型</text>
      <text x="15" y="48" class="code" fill="#7c3aed">NodeID: ns=2; s=Device.Tag_01</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">轻量级 RESTful 数据开放接口</text>
      <text x="15" y="48" class="code" fill="#0ea5e9">Protocol: HTTP POST Standard JSON</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="250" height="70" rx="10" fill="url(#grad-indigo)" stroke="#bae6fd" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl" fill="#1e1b4b">工业上层数字孪生生态集成</text>
      <text x="15" y="48" class="code" fill="#312e81">Target: SCADA / MES / IoT Cloud</text>
    </g>
  </g>
</svg>
