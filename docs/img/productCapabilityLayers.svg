<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="720" viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 全局现代科技感背景微渐变 -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <!-- 高级扁平化层级立体阴影 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>

    <!-- 各层级专属工业风微渐变底纹 -->
    <linearGradient id="g_blue" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="g_green" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="g_amber" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fffbeb"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="g_purple" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#faf5ff"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="g_slate" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>

    <!-- 标准化连接器箭头 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#94a3b8"/>
    </marker>

    <!-- 全局字体控制样式 -->
    <style>
      .title-main { fill: #0f172a; font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-weight: 800; font-size: 20px; letter-spacing: 0.5px; }
      .title-sub { fill: #64748b; font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-size: 13px; font-weight: 400; }
      .layer-badge { font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-weight: 800; font-size: 12px; fill: #ffffff; }
      .layer-title { font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-weight: 700; font-size: 15px; fill: #1e293b; }
      .card-title { font-family: 'Segoe UI','Microsoft YaHei',sans-serif; font-weight: 700; font-size: 13px; }
      .card-desc { font-family: 'Consolas','Courier New',monospace; font-size: 11px; fill: #64748b; }
    </style>
  </defs>

  <!-- 画布物理底板 -->
  <rect width="1000" height="720" fill="url(#bg_grad)"/>
  <rect x="20" y="20" width="960" height="680" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="20" width="960" height="6" rx="3" fill="#d97706" opacity="0.9"/>

  <!-- 顶部主标题大区 -->
  <g transform="translate(500, 55)" text-anchor="middle">
    <text class="title-main">EdgeX 工业物联网网关产品能力分层架构</text>
    <text y="24" class="title-sub">Industrial IoT Edge Gateway Capability Framework</text>
  </g>

  <!-- ==================== LAYER 1: 接入层 ==================== -->
  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="920" height="90" rx="12" fill="url(#g_blue)" stroke="#3b82f6" stroke-width="1.5"/>
    <rect width="120" height="26" rx="6" fill="#3b82f6" x="15" y="-13"/>
    <text x="75" y="4" text-anchor="middle" class="layer-badge">01 南向接入层</text>
    <text x="150" y="24" class="layer-title">Southbound Access — OT 工业协议适配</text>
    <!-- 子能力卡片 A -->
    <g transform="translate(150, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#1d4ed8">■ 12+ 种原生工业协议驱动库</text>
      <text x="12" y="32" class="card-desc">Modbus-RTU/TCP · OPC UA · BACnet · Siemens S7 · EtherNet/IP</text>
    </g>
    <!-- 子能力卡片 B -->
    <g transform="translate(530, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#1d4ed8">■ 拓扑自发现与动态点位注册</text>
      <text x="12" y="32" class="card-desc">OPC UA 节点浏览 · BACnet WhoIs 广播 · 异构设备批量自适应</text>
    </g>
  </g>

  <!-- 垂直流向管道线 1->2 -->
  <path d="M 500 200 L 500 222" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== LAYER 2: 采集层 ==================== -->
  <g transform="translate(40, 225)" filter="url(#shadow)">
    <rect width="920" height="90" rx="12" fill="url(#g_green)" stroke="#22c55e" stroke-width="1.5"/>
    <rect width="120" height="26" rx="6" fill="#22c55e" x="15" y="-13"/>
    <text x="75" y="4" text-anchor="middle" class="layer-badge">02 内核采集层</text>
    <text x="150" y="24" class="layer-title">Core Scan Engine — 确定性高频采集</text>
    <!-- 子能力卡片 A -->
    <g transform="translate(150, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#166534">■ ScanEngine 毫秒级高精调度</text>
      <text x="12" y="32" class="card-desc">10ms 级确定性轮询 · EDF (最早截止优先) 实时算法</text>
    </g>
    <!-- 子能力卡片 B -->
    <g transform="translate(530, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#166534">■ 任务隔离队列与数据影子</text>
      <text x="12" y="32" class="card-desc">高低优先级线程池隔离 · 影子真源解耦写入 · 降低总线负荷</text>
    </g>
  </g>

  <!-- 垂直流向管道线 2->3 -->
  <path d="M 500 315 L 500 337" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== LAYER 3: 边缘层 ==================== -->
  <g transform="translate(40, 340)" filter="url(#shadow)">
    <rect width="920" height="90" rx="12" fill="url(#g_amber)" stroke="#f59e0b" stroke-width="1.5"/>
    <rect width="120" height="26" rx="6" fill="#f59e0b" x="15" y="-13"/>
    <text x="75" y="4" text-anchor="middle" class="layer-badge">03 本地边缘层</text>
    <text x="150" y="24" class="layer-title">Local Intelligence — 边缘计算与物模型抽象</text>
    <!-- 子能力卡片 A -->
    <g transform="translate(150, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#92400e">■ 边缘规则计算引擎</text>
      <text x="12" y="32" class="card-desc">原子 RMW (读改写) 操作 · 位运算 · 公式多点线性聚合转换</text>
    </g>
    <!-- 子能力卡片 B -->
    <g transform="translate(530, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#92400e">■ 虚拟资产影子与派生计算</text>
      <text x="12" y="32" class="card-desc">虚拟复合设备抽象 · 跨设备逻辑映射 · 跨系统派生点位生成</text>
    </g>
  </g>

  <!-- 垂直流向管道线 3->4 -->
  <path d="M 500 430 L 500 452" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== LAYER 4: 北向层 ==================== -->
  <g transform="translate(40, 455)" filter="url(#shadow)">
    <rect width="920" height="90" rx="12" fill="url(#g_purple)" stroke="#a855f7" stroke-width="1.5"/>
    <rect width="120" height="26" rx="6" fill="#a855f7" x="15" y="-13"/>
    <text x="75" y="4" text-anchor="middle" class="layer-badge">04 北向集成层</text>
    <text x="150" y="24" class="layer-title">Northbound Integration — 云边协同与多系统分发</text>
    <!-- 子能力卡片 A -->
    <g transform="translate(150, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#6b21a8">■ 工业 IT 标准上报组件</text>
      <text x="12" y="32" class="card-desc">MQTT 多中心分发 · Sparkplug B 状态流 · 统一对外 OPC UA 服务</text>
    </g>
    <!-- 子能力卡片 B -->
    <g transform="translate(530, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#6b21a8">■ 本地全功能可视化与订阅</text>
      <text x="12" y="32" class="card-desc">高并发 WebSocket 零延迟分发 · 管理控制 UI · GraphQL 订阅</text>
    </g>
  </g>

  <!-- 垂直流向管道线 4->5 -->
  <path d="M 500 545 L 500 567" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== LAYER 5: 质量层 ==================== -->
  <g transform="translate(40, 570)" filter="url(#shadow)">
    <rect width="920" height="90" rx="12" fill="url(#g_slate)" stroke="#64748b" stroke-width="1.5"/>
    <rect width="120" height="26" rx="6" fill="#64748b" x="15" y="-13"/>
    <text x="75" y="4" text-anchor="middle" class="layer-badge">05 可量化质量层</text>
    <text x="150" y="24" class="layer-title">Quality Assurance — 工业级稳定性防线 (SLA)</text>
    <!-- 子能力卡片 A -->
    <g transform="translate(150, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#334155">■ 严格时延门控与确定性诊断</text>
      <text x="12" y="32" class="card-desc">全链路 Lag P95 &lt; 100ms · 采集丢包率 Miss = 0 强制守卫</text>
    </g>
    <!-- 子能力卡片 B -->
    <g transform="translate(530, 38)">
      <rect width="360" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="12" y="18" class="card-title" fill="#334155">■ 极端压力验证与闭环回归体系</text>
      <text x="12" y="32" class="card-desc">万点点表 (Tag) 级长稳 Soak 压测 · CI 自动化测试门槛校验</text>
    </g>
  </g>

  <!-- 穿透全链路的纵向全局质量边界标志 (左侧装饰线呼应) -->
  <path d="M 30 110 L 30 660" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4 4" opacity="0.6"/>
  <path d="M 970 110 L 970 660" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4 4" opacity="0.6"/>
  
  <text x="500" y="690" text-anchor="middle" style="font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:11px; fill:#94a3b8;">
    数据流向：OT 工业现场总线 ➔ 毫秒级采集调度内核 ➔ 边缘本地计算派生 ➔ 北向多云分发 IT 集成 (全链路接受 05 级 SLA 自动化质检监测)
  </text>
</svg>
