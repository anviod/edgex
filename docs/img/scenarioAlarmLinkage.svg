<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    
    <linearGradient id="alarm_hot" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <linearGradient id="grad-orange" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffedd5"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="grad-rose" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffe4e6"/><stop offset="100%" stop-color="#fff1f2"/></linearGradient>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c7d2fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>

    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#dc2626"/>
    </marker>

    <style>
      .title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .group-title { font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val { fill:#0f172a; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:24px; }
      .chart-lbl { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:11px; font-weight:600; }
      .pulse { animation: blink 1s ease-in-out infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#ef4444" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="title">告警安全联动：温度越限监控与故障自动化通道响应系统</text>
    <text y="24" class="subtitle">EdgeX 边缘计算网关 · 闭环控制逻辑横向单条直线全对齐零交叉设计</text>
  </g>

  <g transform="translate(70, 0)">
    <rect x="0" y="130" width="260" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="260" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="260" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#b91c1c">■ 源端故障与状态采集层</text>

    <g transform="translate(15, 175)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#ea580c"/>
      <text x="20" y="28" class="lbl">核心动力温升传感器</text>
      <text x="20" y="48" class="code">Metric: temp = 87.3 ℃</text>
      <circle cx="210" cy="22" r="6" fill="#ef4444" class="pulse"/>
    </g>

    <g transform="translate(15, 285)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#dc2626"/>
      <text x="20" y="28" class="lbl">主控板系统故障自检</text>
      <text x="20" y="48" class="code">Reg: fault_code = 0xE042</text>
      <circle cx="210" cy="22" r="6" fill="#dc2626" class="pulse"/>
    </g>

    <g transform="translate(15, 395)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
      <rect width="6" height="70" rx="3" fill="#64748b"/>
      <text x="20" y="28" class="lbl">机械臂轴承震动幅值</text>
      <text x="20" y="48" class="code">Metric: vib = 2.4 mm/s</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
      <rect width="6" height="70" rx="3" fill="#64748b"/>
      <text x="20" y="28" class="lbl">气动末端主回路压力</text>
      <text x="20" y="48" class="code">Metric: press = 0.58 MPa</text>
    </g>
  </g>


  <path d="M 330 210 H 490" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" class="dash-line"/>
  <path d="M 330 320 H 490" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)" class="dash-line"/>
  <path d="M 330 430 H 490" stroke="#64748b" stroke-width="1.5" class="dash-line"/>
  <path d="M 330 540 H 490" stroke="#64748b" stroke-width="1.5" class="dash-line"/>

  <circle r="4" fill="#ea580c"><animateMotion dur="1.1s" repeatCount="indefinite" path="M 330 210 H 490"/></circle>
  <circle r="4" fill="#dc2626"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 330 320 H 490"/></circle>


  <g transform="translate(490, 0)">
    <rect x="0" y="130" width="420" height="510" rx="14" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="8 5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="420" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="420" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#991b1b">■ 强时效性的规则判定矩阵</text>

    <g transform="translate(25, 175)">
      <rect width="370" height="70" rx="10" fill="url(#grad-orange)" stroke="#ea580c" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">阈值越限判定 ＞ 85 ℃ (重度过热)</text>
      <text x="25" y="50" class="code">Rule: if (temp &gt; 85.0) -> set cooling_fan = ON</text>
    </g>

    <g transform="translate(25, 285)">
      <rect width="370" height="70" rx="10" fill="url(#grad-rose)" stroke="#dc2626" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">致命系统硬件故障事件拦截</text>
      <text x="25" y="50" class="code">Rule: if (fault_code != 0x0) -> trigger backup_ch</text>
    </g>

    <g transform="translate(25, 395)">
      <rect width="370" height="70" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.2"/>
      <text x="25" y="28" class="lbl">震动渐进性演变劣化安全边际评估</text>
      <text x="25" y="50" class="code">Rule: if (vib_rms &gt; 4.5) -> emit warning_log</text>
    </g>

    <g transform="translate(25, 505)">
      <rect width="370" height="70" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.2"/>
      <text x="25" y="28" class="lbl">气压骤降或连续失压欠压分析</text>
      <text x="25" y="50" class="code">Rule: if (press &lt; 0.40) -> lockout_pneumatic</text>
    </g>
  </g>


  <path d="M 910 210 H 1050" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <path d="M 910 320 H 1050" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <path d="M 910 430 H 1050" stroke="#64748b" stroke-width="1.5"/>
  <path d="M 910 540 H 1050" stroke="#64748b" stroke-width="1.5"/>

  <circle r="3.5" fill="#ea580c"><animateMotion dur="1.0s" repeatCount="indefinite" path="M 910 210 H 1050"/></circle>
  <circle r="3.5" fill="#dc2626"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 910 320 H 1050"/></circle>


  <g transform="translate(1050, 0)">
    <rect x="0" y="130" width="280" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="280" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="280" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#0f172a">■ 工业硬件执行与动作联动</text>

    <g transform="translate(15, 175)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">大功率辅助排风制冷</text>
      <text x="15" y="52" class="val" fill="#ea580c">ON <tspan class="unit">/ 散热风扇全速</tspan></text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl">A/B主备高可用物理通道</text>
      <text x="15" y="52" class="val" fill="#dc2626">CH-B <tspan class="unit">ACTIVE [已切]</tspan></text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
      <text x="15" y="24" class="chart-lbl">现场声光报警器指示蜂鸣</text>
      <text x="15" y="50" class="code">Status: Normal / Standby</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="250" height="70" rx="10" fill="url(#grad-indigo)" stroke="#bae6fd" stroke-width="1.5"/>
      <text x="15" y="24" class="chart-lbl" fill="#1e1b4b">安全事故追踪时序事件池 (SOE)</text>
      <text x="15" y="48" class="code" fill="#312e81">SOE Pub: edge/safety/linkage_10ms</text>
    </g>
  </g>
</svg>
