<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pwr_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>

    <filter id="card_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.04"/>
    </filter>
    <filter id="glow_yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow_blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="clip_layer_up"><rect width="370" height="80" rx="12"/></clipPath>
    <clipPath id="clip_layer_down"><rect width="370" height="80" rx="12"/></clipPath>
    <clipPath id="clip_layer_map"><rect width="370" height="80" rx="12"/></clipPath>

    <linearGradient id="grad_yellow" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fef9c3"/><stop offset="100%" stop-color="#fffde6"/></linearGradient>
    <linearGradient id="grad_blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#f0f7ff"/></linearGradient>
    <linearGradient id="grad_orange" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffedd5"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>

    <linearGradient id="title_yellow" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="title_blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#bfdbfe"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="title_orange" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>

    <marker id="arrow_yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#b45309"/>
    </marker>
    <marker id="arrow_blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#1d4ed8"/>
    </marker>

    <style>
      .main-title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .section-subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .section-title { fill:#475569; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:2px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val { fill:#0f172a; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:24px; }
      .unit { fill:#64748b; font-size:13px; font-weight:500; }
      .chart-lbl { fill:#475569; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:12px; font-weight:600; }
      .pulse { animation: blink 1.2s ease-in-out infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#pwr_bg)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#ca8a04" opacity="0.9"/>

  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="main-title">电力自动化控制：IEC 60870-5-104 变电站遥测采集与遥控协同引擎</text>
    <text y="24" class="section-subtitle">Edgex 边缘计算网关 · 遥测上行与遥控下行通道横向绝对平直、零交叉流转</text>
  </g>

  <line x1="330" y1="120" x2="330" y2="640" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1020" y1="120" x2="1020" y2="640" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>

  <text x="177" y="125" text-anchor="middle" class="section-title">■ 变电站现场设备层 (INPUT)</text>
  <text x="675" y="125" text-anchor="middle" class="section-title">■ IEC104 协议驱动引擎 (ENGINE)</text>
  <text x="1195" y="125" text-anchor="middle" class="section-title">■ 调度数据映射看板 (OUTPUT)</text>


  <g transform="translate(50, 175)" filter="url(#card_shadow)">
    <rect width="250" height="80" rx="12" fill="#ffffff" stroke="#eab308" stroke-width="1.5"/>
    <rect width="6" height="80" rx="3" fill="#eab308"/>
    <g transform="translate(20, 14)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
      <circle cx="12" cy="24" r="10" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
      <circle cx="195" cy="18" r="5" fill="#22c55e" class="pulse"/>
    </g>
    <text x="52" y="28" class="lbl">变电站 RTU / 保护装置</text>
    <text x="20" y="64" class="code">监视链路: TCP Port 2404 (YC/YX)</text>
  </g>
  <g transform="translate(490, 175)" filter="url(#card_shadow)">
    <rect width="370" height="80" rx="12" fill="#ffffff" stroke="#eab308" stroke-width="1.5"/>
    <g clip-path="url(#clip_layer_up)"><rect width="370" height="24" fill="url(#title_yellow)"/></g>
    <text x="20" y="17" style="font-size:11px; font-weight:700; fill:#a16207;">总召唤数据处理层 (上行通道)</text>
    <text x="20" y="46" class="lbl">GI (General Interrogation) 自发上报解包</text>
    <text x="20" y="66" class="code">ASDU M_ME_TF_1 · 毫秒级时标SOE解析</text>
  </g>
  <g transform="translate(1050, 175)" filter="url(#card_shadow)">
    <rect width="270" height="80" rx="12" fill="url(#grad_yellow)" stroke="#eab308" stroke-width="1.5"/>
    <text x="15" y="24" class="chart-lbl">110kV 母线段实时测量电压 (遥测)</text>
    <text x="15" y="54" class="val" fill="#a16207">110.24 <tspan class="unit">kV</tspan></text>
    <path d="M160 55 Q185 45 210 52 T260 48" fill="none" stroke="#ca8a04" stroke-width="1.5" opacity="0.4"/>
  </g>
  <path d="M 300 215 H 490" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrow_yellow)" class="dash-line"/>
  <path d="M 860 215 H 1050" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrow_yellow)"/>


  <g transform="translate(50, 315)" filter="url(#card_shadow)">
    <rect width="250" height="80" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <rect width="6" height="80" rx="3" fill="#2563eb"/>
    <g transform="translate(20, 15)">
      <path d="M0 10 H 20 M 20 10 L 35 -2 M 35 10 H 50" fill="none" stroke="#ef4444" stroke-width="2"/>
    </g>
    <text x="85" y="28" class="lbl">CB-01 高压断路器</text>
    <text x="20" y="64" class="code">执行机构: 遥控分闸 (Trip Line)</text>
  </g>
  <g transform="translate(490, 318)" filter="url(#card_shadow)">
    <rect width="370" height="80" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <g clip-path="url(#clip_layer_down)"><rect width="370" height="24" fill="url(#title_blue)"/></g>
    <text x="20" y="17" style="font-size:11px; font-weight:700; fill:#1e40af;">安全遥控选择与执行 (下行通道)</text>
    <text x="20" y="46" class="lbl">单点遥控 C_SC_NA 双重原子化校验机制</text>
    <text x="20" y="66" class="code">Select(选择) ➔ Execute(执行) ➔ Confirm(激活确认)</text>
  </g>
  <g transform="translate(1050, 315)" filter="url(#card_shadow)">
    <rect width="270" height="80" rx="12" fill="url(#grad_blue)" stroke="#2563eb" stroke-width="1.5"/>
    <text x="15" y="24" class="chart-lbl">网关远程调度控制命令反馈</text>
    <text x="15" y="52" class="val" fill="#1d4ed8" font-size="16px">CB-01 Breaker ➔ OFF</text>
    <text x="15" y="68" class="code" fill="#2563eb">双检锁固 · 分闸指令就绪</text>
  </g>
  <path d="M 1050 355 H 860" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow_blue)" class="dash-line"/>
  <path d="M 490 355 H 300" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow_blue)"/>


  <g transform="translate(50, 455)" filter="url(#card_shadow)">
    <rect width="250" height="80" rx="12" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
    <rect width="6" height="80" rx="3" fill="#f97316"/>
    <circle cx="30" cy="24" r="6" fill="#10b981"/>
    <circle cx="30" cy="44" r="6" fill="#ef4444"/>
    <text x="48" y="28" class="code">CB-01 开关分位 (绿灯闪烁)</text>
    <text x="48" y="48" class="code">CB-02 开关合位 (红灯常亮)</text>
    <text x="20" y="68" class="lbl">辅助触点常开/常闭硬布线</text>
  </g>
  <g transform="translate(490, 461)" filter="url(#card_shadow)">
    <rect width="370" height="80" rx="12" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
    <g clip-path="url(#clip_layer_map)"><rect width="370" height="24" fill="url(#title_orange)"/></g>
    <text x="20" y="17" style="font-size:11px; font-weight:700; fill:#c2410c;">数据拓扑映射层 (ShadowCore)</text>
    <text x="20" y="46" class="lbl">信息体地址(IOA) ⇄ 归一化点表变换</text>
    <text x="20" y="66" class="code">Map: IOA.Addr_1001 ➔ substation.device_01.yx_pos</text>
  </g>
  <g transform="translate(1050, 455)" filter="url(#card_shadow)">
    <rect width="270" height="80" rx="12" fill="url(#grad_orange)" stroke="#f97316" stroke-width="1.5"/>
    <text x="15" y="24" class="chart-lbl">实时遥信变位记录 (SOE 事件时标)</text>
    <g transform="translate(15, 38)">
      <circle cx="6" cy="10" r="4" fill="#22c55e"/>
      <text x="16" y="14" class="code" style="font-size:10px;">[18:49:56.102] 遥信开位正常</text>
      <circle cx="6" cy="24" r="4" fill="#ef4444"/>
      <text x="16" y="28" class="code" style="font-size:10px;">[18:49:56.115] 隔离刀闸闭合</text>
    </g>
  </g>
  <path d="M 300 495 H 490" stroke="#f97316" stroke-width="2" marker-end="url(#arrow_yellow)" class="dash-line"/>
  <path d="M 860 495 H 1050" stroke="#f97316" stroke-width="2" marker-end="url(#arrow_yellow)"/>


  <rect x="465" y="145" width="420" height="425" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <rect x="465" y="585" width="420" height="24" rx="12" fill="#e2e8f0" opacity="0.7"/>
  <text x="675" y="601" text-anchor="middle" style="font-size:11px; fill:#475569; font-weight:700;">IEC 60870-5-104 通信主站/从站双向对等内核</text>

  <circle r="4" fill="#ca8a04" filter="url(#glow_yellow)"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 300 215 H 490"/></circle>
  <circle r="4" fill="#eab308" filter="url(#glow_yellow)"><animateMotion dur="1.1s" repeatCount="indefinite" path="M 860 215 H 1050"/></circle>

  <circle r="4" fill="#1d4ed8" filter="url(#glow_blue)"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 1050 355 H 860"/></circle>
  <circle r="4" fill="#3b82f6" filter="url(#glow_blue)"><animateMotion dur="1.2s" repeatCount="indefinite" path="M 490 355 H 300"/></circle>

  <circle r="4" fill="#f97316" filter="url(#glow_yellow)"><animateMotion dur="1.6s" repeatCount="indefinite" path="M 300 495 H 490"/></circle>
  <circle r="4" fill="#ea580c" filter="url(#glow_yellow)"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 860 495 H 1050"/></circle>
</svg>
