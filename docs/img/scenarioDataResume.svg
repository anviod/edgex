<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
    
    <linearGradient id="grad-yellow" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fef08a"/><stop offset="100%" stop-color="#fef9c3"/></linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#bfdbfe"/><stop offset="100%" stop-color="#eff6ff"/></linearGradient>
    <linearGradient id="grad-emerald" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a7f3d0"/><stop offset="100%" stop-color="#ecfdf5"/></linearGradient>
    <linearGradient id="grad-green" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#bbf7d0"/><stop offset="100%" stop-color="#f0fdf4"/></linearGradient>

    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8 5 L0 8.5 Z" fill="#16a34a"/>
    </marker>

    <style>
      .title { fill:#0f172a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:800; font-size:22px; letter-spacing:1px; }
      .subtitle { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:13px; font-weight:400; }
      .group-title { font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; }
      .lbl { fill:#1e293b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:14px; font-weight:600; }
      .code { fill:#475569; font-family:'Consolas','Courier New',monospace; font-size:11px; }
      .val { fill:#0f172a; font-family:'Segoe UI',sans-serif; font-weight:800; font-size:24px; }
      .unit { fill:#64748b; font-size:12px; font-weight:500; }
      .chart-lbl { fill:#64748b; font-family:'Segoe UI','Microsoft YaHei',sans-serif; font-size:11px; font-weight:600; }
      .dash-line { stroke-dasharray: 6 4; animation: march 1.5s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect x="25" y="25" width="1350" height="650" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="25" y="25" width="1350" height="6" rx="3" fill="#10b981" opacity="0.9"/>
  
  <g transform="translate(700, 65)" text-anchor="middle">
    <text class="title">物联网数据断点续传：本地缓冲与网络恢复补传系统</text>
    <text y="24" class="subtitle">极致工整纵向四级等距栅格化对齐 · 数据信号全真水平路由无交错</text>
  </g>

  <g transform="translate(70, 0)">
    <rect x="0" y="130" width="260" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="260" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="260" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#059669">■ 现场数据采集层</text>

    <g transform="translate(15, 175)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#10b981"/>
      <text x="20" y="28" class="lbl">ScanEngine 引擎</text>
      <text x="20" y="48" class="code">Status: Active Continuous</text>
      <circle cx="205" cy="24" r="5" fill="#22c55e" stroke="#bbf7d0" stroke-width="2"/>
    </g>

    <g transform="translate(15, 285)">
      <rect width="230" height="70" rx="8" fill="#fff5f5" stroke="#fecaca" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#ef4444"/>
      <text x="20" y="28" class="lbl" fill="#991b1b">网络通信链路监控</text>
      <text x="20" y="48" class="code" fill="#dc2626" font-weight="700">Link: OFFLINE 断网</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#10b981"/>
      <text x="20" y="28" class="lbl">本地高可靠存储队列</text>
      <text x="20" y="48" class="code">MemQueue: 12,480 items</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="230" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
      <rect width="6" height="70" rx="3" fill="#10b981"/>
      <text x="20" y="28" class="lbl">本地磁盘物理高速缓冲</text>
      <text x="20" y="48" class="code">Storage: Disk RingBuffer</text>
    </g>
  </g>


  <path d="M 330 210 H 490" stroke="#059669" stroke-width="2" marker-end="url(#arrow-emerald)" class="dash-line"/>
  <path d="M 330 320 H 490" stroke="#059669" stroke-width="2" marker-end="url(#arrow-emerald)" class="dash-line"/>
  <path d="M 330 430 H 490" stroke="#059669" stroke-width="2" marker-end="url(#arrow-emerald)" class="dash-line"/>
  <path d="M 330 540 H 490" stroke="#059669" stroke-width="2" marker-end="url(#arrow-emerald)" class="dash-line"/>

  <circle r="4" fill="#10b981"><animateMotion dur="1.6s" repeatCount="indefinite" path="M 330 210 H 490"/></circle>
  <circle r="4" fill="#10b981"><animateMotion dur="2.1s" repeatCount="indefinite" path="M 330 320 H 490"/></circle>
  <circle r="4" fill="#10b981"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 330 430 H 490"/></circle>
  <circle r="4" fill="#10b981"><animateMotion dur="1.9s" repeatCount="indefinite" path="M 330 540 H 490"/></circle>


  <g transform="translate(490, 0)">
    <rect x="0" y="130" width="420" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="420" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="420" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#047857">■ 边缘侧断点续传核心引擎 (Resume Engine)</text>

    <g transform="translate(25, 175)">
      <rect width="370" height="70" rx="10" fill="url(#grad-yellow)" stroke="#d97706" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">本地事务存储机制</text>
      <text x="25" y="50" class="code">Database: SQLite3 / WAL Mode Time-Series</text>
    </g>

    <g transform="translate(25, 285)">
      <rect width="370" height="70" rx="10" fill="url(#grad-blue)" stroke="#2563eb" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">时序严整性重排</text>
      <text x="25" y="50" class="code">Algorithm: Order By ASC Timestamp Pipeline</text>
    </g>

    <g transform="translate(25, 395)">
      <rect width="370" height="70" rx="10" fill="url(#grad-emerald)" stroke="#059669" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">链路自动重连监测机制</text>
      <text x="25" y="50" class="code">Strategy: Active Auto-Reconnect Heartbeat</text>
    </g>

    <g transform="translate(25, 505)">
      <rect width="370" height="70" rx="10" fill="url(#grad-green)" stroke="#16a34a" stroke-width="1.5"/>
      <text x="25" y="28" class="lbl">变频控流高速补传</text>
      <text x="25" y="50" class="code">Performance: Batch = 500 items/sec (Throttle)</text>
    </g>
  </g>


  <path d="M 910 210 H 1050" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 910 320 H 1050" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 910 430 H 1050" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 910 540 H 1050" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <circle r="3.5" fill="#22c55e"><animateMotion dur="1.2s" repeatCount="indefinite" path="M 910 210 H 1050"/></circle>
  <circle r="3.5" fill="#22c55e"><animateMotion dur="1.7s" repeatCount="indefinite" path="M 910 320 H 1050"/></circle>
  <circle r="3.5" fill="#22c55e"><animateMotion dur="1.1s" repeatCount="indefinite" path="M 910 430 H 1050"/></circle>
  <circle r="3.5" fill="#22c55e"><animateMotion dur="1.5s" repeatCount="indefinite" path="M 910 540 H 1050"/></circle>


  <g transform="translate(1050, 0)">
    <rect x="0" y="130" width="280" height="510" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="130" width="280" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="155" width="280" height="15" fill="#f8fafc"/>
    <text x="20" y="156" class="group-title" fill="#1e3a8a">■ 云端中心接收层</text>

    <g transform="translate(15, 175)">
      <rect width="250" height="70" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
      <text x="18" y="24" class="chart-lbl" fill="#166534">云端链路网络恢复</text>
      <text x="18" y="52" class="val" fill="#16a34a" font-size="20px">MQTT → ONLINE</text>
    </g>

    <g transform="translate(15, 285)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="18" y="22" class="chart-lbl">补传队列实时处理进度</text>
      <g transform="translate(18, 32)">
        <rect width="214" height="12" rx="6" fill="#e2e8f0"/>
        <rect width="165" height="12" rx="6" fill="#059669"/>
      </g>
      <text x="18" y="60" class="code" fill="#059669">9,600 / 12,480 items (77%)</text>
    </g>

    <g transform="translate(15, 395)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="18" y="25" class="chart-lbl">时序连续性与完整性校验</text>
      <text x="18" y="48" class="code" fill="#2563eb">✓ Timeline Integrity Confirmed</text>
    </g>

    <g transform="translate(15, 505)">
      <rect width="250" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="18" y="25" class="chart-lbl">持久化云端存储状态</text>
      <text x="18" y="50" class="code" fill="#15803d">Status: Zero Data Loss Guaranteed</text>
    </g>
  </g>
</svg>
