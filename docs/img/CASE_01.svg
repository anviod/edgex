<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="40" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#1e293b">CASE_01: INDUSTRIAL_PREDICTIVE_MAINTENANCE</text>

  <g transform="translate(50, 150)">
    <rect width="160" height="100" rx="2" fill="#fff" stroke="#0ea5e9" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#0ea5e9">CNC_Lathe_01</text>
    <text x="15" y="50" font-family="monospace" font-size="10" fill="#64748b">TEMP: 78.4°C</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#64748b">VIB: 0.12g</text>
  </g>

  <g transform="translate(320, 120)">
    <rect width="200" height="160" rx="4" fill="#fff" stroke="#6c5ce7" stroke-width="1.5"/>
    <rect width="200" height="28" fill="#f3f0ff"/>
    <text x="100" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#6c5ce7">EDGE_GW_CORE</text>
    <text x="20" y="60" font-family="monospace" font-size="10" fill="#1e293b">Rule: Vib_Anomaly_Check</text>
    <text x="20" y="90" font-family="monospace" font-size="10" fill="#1e293b">Calc: OEE_Efficiency</text>
    <text x="20" y="140" font-family="monospace" font-size="10" fill="#22c55e">Downtime: -60%</text>
  </g>

  <g transform="translate(620, 150)">
    <rect width="140" height="100" rx="2" fill="#fff" stroke="#ef4444" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444">Emergency_Stop</text>
    <circle cx="70" cy="65" r="15" fill="none" stroke="#ef4444" stroke-width="1"/>
    <text x="70" y="70" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">SHUT</text>
  </g>

  <path id="path1" d="M210 200 L 320 200" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,2" fill="none"/>
  <path id="path2" d="M520 200 L 620 200" stroke="#6c5ce7" stroke-width="1" fill="none"/>

  <circle r="3" fill="#0ea5e9">
    <animateMotion dur="1.5s" repeatCount="indefinite">
      <mpath href="#path1"/>
    </animateMotion>
  </circle>
  
  <circle r="3" fill="#6c5ce7">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#path2"/>
    </animateMotion>
  </circle>
</svg>
