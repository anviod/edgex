# 站点配置
encoding: utf-8
markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
  syntax_highlighter: rouge
  hard_wrap: false
name: EdgeX
description: EdgeX 工业边缘计算平台 · 统一设备接入、边缘计算与数据互联
lang: zh-CN
url: https://anviod.github.io
baseurl: /edgex

# 主题设置
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# 导航配置
nav:
  - title: 返回项目
    url: https://github.com/anviod/edgex
  - title: 首页
    url: /
  - title: 产品指南
    url: /guide/
  - title: 设备驱动
    url: /drivers/
  - title: 测试验证
    url: /testing/
  - title: 边缘计算
    url: /edge/
  - title: 开发计划
    url: /development_plan/

# 页面配置
permalink: /:path/:basename.html

defaults:
  - scope:
      path: ""
    values:
      layout: default

# 排除文件（内部归档、构建脚本与重复副本，不发布到 GitHub Pages）
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - README_CN.md
  - scripts/
  - done/
  - man/
  - deployment/index.md
