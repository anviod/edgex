# 站点配置
encoding: utf-8
name: EdgeX 文档
description: EdgeX 项目文档网站

# 主题设置
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme  # 添加远程主题支持
  - jekyll-seo-tag
  - jekyll-sitemap

# 导航配置
nav:
  - title: 返回项目
    url: https://github.com/anviod/edgex
  - title: 首页
    url: /
  - title: 产品介绍
    url: /guide/产品说明.html
  - title: 用户手册
    url: /guide/USER_MANUAL.html
  - title: 设备驱动
    url: /drivers/
  - title: 开发计划
    url: /development_plan/

# 页面配置
permalink: /:path/:basename.html

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - README_CN.md