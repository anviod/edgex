# 站点配置
encoding: utf-8
markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
  syntax_highlighter: rouge
  hard_wrap: false
name: EdgeX 知识库
description: EdgeX 工业边缘网关专家知识库 — 南向驱动、架构设计与运维文档

# 主题设置
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme  # 添加远程主题支持
  - jekyll-seo-tag
  - jekyll-sitemap

# 导航配置
nav:
  - title: 返回项目
    url: https://github.com/anviod/edgex
  - title: 首页
    url: /
  - title: 产品指南
    url: /guide/
  - title: 设备驱动
    url: /drivers/
  - title: 边缘计算
    url: /edge/


# 页面配置
permalink: /:path/:basename.html

defaults:
  - scope:
      path: ""
    values:
      layout: default

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - README_CN.md
  - TODO/
  - "[TODO]边缘计算南向采集优化方案2026第三季度.md"
  - "[TODO]边缘计算南向采集优化方案2026第二季度.md"