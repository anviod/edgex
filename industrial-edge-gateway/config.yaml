server:
    port: 8082
storage:
    path: ./data/gateway.db
northbound:
    mqtt:
        enable: true
        broker: tcp://127.0.0.1:1883
        client_id: industrial_gateway_001
        topic: gateway/uplink
        username: ""
        password: ""
        devices:
            opcua-device-1:
                enable: false
                strategy: periodic
                interval: 0s
            remote-slave-1:
                enable: false
                strategy: periodic
                interval: 0s
            rtu-device-1:
                enable: false
                strategy: periodic
                interval: 0s
            s7-pressure-sensor:
                enable: false
                strategy: periodic
                interval: 0s
            s7-pump-1:
                enable: false
                strategy: periodic
                interval: 0s
            s7-water-meter:
                enable: false
                strategy: periodic
                interval: 0s
            slave-1:
                enable: true
                strategy: periodic
                interval: 10s
            slave-2:
                enable: true
                strategy: periodic
                interval: 30s
    opcua:
        enable: true
        port: 5000
        endpoint: /test
        devices:
            opcua-device-1: false
            remote-slave-1: false
            rtu-device-1: false
            s7-pressure-sensor: true
            s7-pump-1: true
            s7-water-meter: true
            slave-1: true
            slave-2: false
channels:
    - id: opcua-sim-1
      name: OPC UA Simulator Channel
      protocol: opc-ua
      enable: true
      config:
        url: opc.tcp://127.0.0.1:4840
      devices:
        - id: opcua-device-1
          name: Simulated Machine A
          enable: true
          interval: 2s
          config: {}
          points:
            - id: machine_speed
              name: Machine Speed
              address: ns=2;s=Machine.Speed
              datatype: float32
              scale: 0
              offset: 0
              unit: rpm
              readwrite: RW
              group: ""
              report_mode: ""
              threshold: null
            - id: machine_status
              name: Machine Status
              address: ns=2;s=Machine.Status
              datatype: string
              scale: 0
              offset: 0
              unit: ""
              readwrite: R
              group: ""
              report_mode: ""
              threshold: null
            - id: machine_temp
              name: Core Temperature
              address: ns=2;s=Machine.Temp
              datatype: float32
              scale: 0
              offset: 0
              unit: °C
              readwrite: R
              group: ""
              report_mode: ""
              threshold: null
    - id: modbus-tcp-2
      name: Modbus TCP Channel 2 (远程机房)
      protocol: modbus-tcp
      enable: false
      config:
        group_threshold: 50
        max_packet_size: 125
        url: tcp://192.168.1.100:502
      devices:
        - id: remote-slave-1
          name: Remote Slave 1
          enable: true
          interval: 10s
          config:
            slave_id: 1
          points:
            - id: remote_temp
              name: Remote Temperature
              address: "40001"
              datatype: int16
              scale: 0.1
              offset: 0
              unit: °C
              readwrite: R
              group: ""
              report_mode: ""
              threshold: null
