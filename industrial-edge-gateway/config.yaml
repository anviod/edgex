    - id: modbus-rtu-1
      name: Modbus RTU Channel (本地网关)
      protocol: modbus-rtu
      enable: false
      config:
        baudrate: 9600
        port: /dev/ttyUSB0
        timeout: 5s
      devices:
        - id: rtu-device-1
          name: RTU Device 1
          enable: true
          interval: 2s
          config:
            slave_id: 1
          points:
