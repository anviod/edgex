version: "1.0"
description: "EdgeX Storage Configuration - Optimized for high-performance data collection and synchronization"

base:
  path: "data/edgex.db"
  permissions: "0755"
  sync_interval: 100ms

boltdb:
  page_size: 65536
  cache_size: 134217728
  timeout: 30s
  no_grow_sync: true
  freelist_type: "array"
  max_batch_size: 1000
  write_buffer_size: 65536

buckets:
  device:
    pattern: "device_{channelID}"
    description: "Per-channel device storage for collected data points"
    access_mode: "read-write"
    retention_days: 30
    max_records: 1000000
    partition_strategy: "device_time"

  snapshot:
    pattern: "snapshot_{deviceID}"
    description: "Device snapshot storage for state capture"
    access_mode: "read-write"
    retention_days: 7
    max_records: 1000

  sync_node:
    pattern: "sync_node_{nodeID}"
    description: "Sync node metadata and state storage"
    access_mode: "read-write"
    retention_days: 90
    max_records: 10000

  values:
    pattern: "values"
    description: "Latest value cache for all data points"
    access_mode: "read-write"
    retention_days: 7
    max_records: 500000

  wal:
    pattern: "wal"
    description: "Write-ahead log for data integrity"
    access_mode: "write-only"
    retention_days: 1
    max_records: 100000

  config:
    pattern: "config"
    description: "Configuration storage for sync manager"
    access_mode: "read-write"
    retention_days: 365
    max_records: 10000

partition:
  primary_key_format: "{deviceID}"
  secondary_key_format: "{deviceID}_{timestamp_hour}"
  timestamp_granularity: "hour"
  key_separator: "_"
  batch_size: 1000

performance:
  max_concurrent_writes: 1000
  max_concurrent_reads: 500
  transaction_timeout: 5s
  write_batch_interval: 10ms
  compression_enabled: false

monitoring:
  metrics_enabled: true
  metrics_interval: 30s
  alert_threshold:
    disk_usage_percent: 90
    write_latency_ms: 100
    read_latency_ms: 50

environment:
  STORAGE_PATH: "${base.path}"
  BOLT_DB_TIMEOUT: "${boltdb.timeout}"
  MAX_CONCURRENT_WRITES: "${performance.max_concurrent_writes}"