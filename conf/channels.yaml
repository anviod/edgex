- id: 44amyf4grh5oq
  name: EtherNetIP-Simulator
  protocol: ethernet-ip
  enable: true
  config:
    batch_read_max: 50
    connection_type: logix
    heartbeat_interval: 30000
    ip: 127.0.0.1
    max_retries: 3
    port: 44818
    retry_interval: 100
    slot: 0
    timeout: 2000
  devices:
    - id: enip-simulator
      name: ENIP-Simulator
      enable: true
      interval: 1s
      device_file: conf/devices/ethernet-ip/simulator-device.yaml
      config: {}
- id: jxy3kvpohmetzct0
