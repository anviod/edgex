- id: 1srhjw7e35hayk76
  name: OPCUA-10
  protocol: opc-ua
  enable: true
  config:
    baudRate: 9600
    byte_order_4: ABCD
    connectionType: serial
    dataBits: 8
    enableSmartProbe: false
    instruction_interval: 10
    max_retries: 3
    parity: E
    probeEnableMTU: true
    probeMaxConsecutive: 20
    probeMaxDepth: 6
    probeTimeout: 3000
    retry_interval: 100
    start_address: 1
    stopBits: 1
    url: opc.tcp://192.168.3.114:53530/OPCUA/SimulationServer
  devices:
    - id: LAPTOP-5E3D21EG
      name: LAPTOP-5E3D21EG
      enable: true
      interval: 10s
      device_file: ./conf/devices/opc-ua/LAPTOP-5E3D21EG.yaml
      config: {}
